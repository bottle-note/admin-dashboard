name: deploy admin dashboard

on:
  workflow_dispatch:
    inputs:
      release-version:
        description: 'dashboard release version (X.Y.Z) for manual dispatch'
        required: true
        type: string
  pull_request:
    types: [closed]
    branches:
      - 'release/dashboard'

concurrency:
  group: "deploy-admin-dashboard"
  cancel-in-progress: true

permissions:
  contents: write

env:
  IMAGE_NAME: bottlenote-admin-dashboard

jobs:
  build-production:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-24.04-arm
    outputs:
      version: ${{ steps.version.outputs.version }}
      image-tag: ${{ steps.version.outputs.image-tag }}
      image-digest: ${{ steps.build.outputs.image-digest }}
    steps:
      - name: checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GIT_ACCESS_TOKEN }}

      - name: read dashboard release version
        id: version
        env:
          SERVICE: dashboard
          RELEASE_TITLE: ${{ github.event.pull_request.title || '' }}
          RELEASE_VERSION_INPUT: ${{ inputs['release-version'] || '' }}
        run: |
          set -euo pipefail
          VERSION="$(python3 - "$SERVICE" <<'PY'
          import os, re, sys
          service = sys.argv[1]
          title = os.environ.get("RELEASE_TITLE", "")
          manual_version = os.environ.get("RELEASE_VERSION_INPUT", "")
          semver = r"(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)"
          if manual_version:
              if not re.fullmatch(semver, manual_version):
                  print(f"::error::invalid manual release version: {manual_version}", file=sys.stderr)
                  sys.exit(1)
              print(manual_version)
              sys.exit(0)
          pattern = re.compile(rf"^\[deploy\]\s+{re.escape(service)}-v({semver})$")
          match = pattern.fullmatch(title.strip())
          if not match:
              print(f"::error::release pull request title must be '[deploy] {service}-vX.Y.Z', got: {title}", file=sys.stderr)
              sys.exit(1)
          print(match.group(1))
          PY
          )"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image-tag=${SERVICE}_${VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: build and push to registry
        id: build
        uses: ./.github/actions/docker-build-push
        with:
          registry-url: ${{ secrets.REGISTRY_ADDRESS }}
          registry-username: ${{ secrets.REGISTRY_USERNAME }}
          registry-password: ${{ secrets.REGISTRY_PASSWORD }}
          image-name: ${{ env.IMAGE_NAME }}
          image-tag: dashboard_${{ steps.version.outputs.version }}
          additional-tags: dashboard_latest
          dockerfile: Dockerfile
          context: .
          platforms: linux/arm64
          cache-scope: dashboard-prod
          image-title: "BottleNote Admin Dashboard"
          image-description: "BottleNote Admin Dashboard Frontend"
          image-vendor: "BottleNote"
          image-authors: "BottleNote Team"
          build-args: |
            ENV_FILE=git.environment-variables/application.vite/prod.sops.env
          build-secrets: |
            age_key=${{ secrets.SOPS_AGE_SECRET_KEY }}
          sign-image: 'true'
          cosign-key-path: 'git.environment-variables/storage/docker-registry/cosign.key'
          cosign-password: ${{ secrets.COSIGN_PASSWORD }}

  update-production:
    needs: build-production
    runs-on: ubuntu-latest
    steps:
      - name: checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GIT_ACCESS_TOKEN }}

      - name: setup kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: update production image tag
        run: |
          IMAGE_TAG="${{ needs.build-production.outputs.image-tag }}"
          REGISTRY="${{ secrets.REGISTRY_ADDRESS }}"

          cd git.environment-variables
          git checkout main

          cd deploy/overlays/production
          kustomize edit set image \
            bottlenote-admin-dashboard=${REGISTRY}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}

      - name: commit and push with retry
        run: |
          cd git.environment-variables

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add deploy/overlays/production/kustomization.yaml

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore(dashboard): update production image tag to ${{ needs.build-production.outputs.image-tag }}

          Updated by GitHub Actions
          Commit: ${{ github.sha }}
          Branch: ${{ github.ref_name }}
          Workflow: ${{ github.workflow }}"

          for i in {1..5}; do
            git pull --rebase origin main && git push origin main && break
            echo "Push failed, retry $i/5..."
            sleep $((i * 2))
          done

  create-release-tag:
    needs: [build-production, update-production]
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: checkout release ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: create dashboard release tag
        env:
          VERSION: ${{ needs.build-production.outputs.version }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail
          TAG="dashboard/v${VERSION}"
          git fetch --tags origin
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            EXISTING_SHA="$(git rev-list -n 1 "${TAG}")"
            if [[ "$EXISTING_SHA" == "$MERGE_SHA" ]]; then
              echo "Release tag already exists on target merge commit: ${TAG}"
              exit 0
            fi
            echo "::error::release tag already exists on a different commit: ${TAG} -> ${EXISTING_SHA}"
            exit 1
          fi
          git tag -a "${TAG}" "${MERGE_SHA}" -m "Release ${TAG}"
          git push origin "refs/tags/${TAG}"
          echo "Created release tag: ${TAG} -> ${MERGE_SHA}"




